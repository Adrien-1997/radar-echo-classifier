services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
      POSTGRES_DB: radar_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d radar_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10

  kibana:
    image: kibana:8.11.0
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  n8n:
    image: n8nio/n8n
    # Import the committed workflow on every startup (idempotent — stable "id" in JSON).
    # Falls back gracefully: if import fails, n8n still starts and manual import remains possible.
    entrypoint:
      - sh
      - -c
      - |
        n8n import:workflow --input=/workflows/workflow_score_latest.json || true
        exec n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n:/workflows:ro

  scorer:
    build: ./scorer
    ports:
      - "8000:8000"
    volumes:
      - ./model:/model:ro
    environment:
      - DATABASE_URL=postgresql://radar:radar@postgres:5432/radar_db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  grafana_data:
  n8n_data:
